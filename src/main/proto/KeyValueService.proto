syntax = "proto3";

package com.vk.tarantool;

import "google/protobuf/empty.proto";

service KeyValueService {
  rpc Put (KeyValue) returns (google.protobuf.Empty);
  rpc Get (Key) returns (Value);
  rpc Delete (Key) returns (google.protobuf.Empty);
  rpc Range (KeyRange) returns (stream KeyValue);
  rpc Count (google.protobuf.Empty) returns (CountResponse);
}

message Key {
  string key = 1;
}

message Value {
  bytes value = 1;
}

message KeyValue {
  string key = 1;
  bytes value = 2;
}

message KeyRange {
  string key_since = 1;
  string key_to = 2;
}

message CountResponse {
  int64 count = 1;
}
